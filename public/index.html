<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truvexa AI</title>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
    }

    p {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* INPUT BOX */
    .input-box {
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      padding: 12px;
      border: 1px solid #e5e7eb;
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      padding: 10px;
      line-height: 1.5;
      box-sizing: border-box;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    /* RESULT */
    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
      border: 1px solid #e5e7eb;
      transition: 0.2s;
    }

    /* STATES */
    .safe {
      background: #ecfdf5;
      border-left: 5px solid #22c55e;
    }

    .danger {
      background: #fef2f2;
      border-left: 5px solid #ef4444;
    }

    .warning {
      background: #fffbeb;
      border-left: 5px solid #f59e0b;
    }

    /* LOADING */
    .loading {
      opacity: 0.6;
      font-style: italic;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 12px;
      color: #888;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🛡️ Truvexa AI</h1>
  <p>Paste any message, link, or email to check if it's safe</p>

  <div class="input-box">
    <textarea 
      id="input" 
      placeholder="Paste message here... (OTP, link, job offer, etc)"
      rows="4">
    </textarea>

    <div class="actions">
      <button onclick="checkScam()">Check</button>
    </div>
  </div>

  <div id="result" class="result-box">
Type something above and click “Check”
  </div>

  <div class="footer">
    Built for safety • Think before you act
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
